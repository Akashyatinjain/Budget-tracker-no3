version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: budget-tracker-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: akashjain042006
      POSTGRES_DB: BudgetTracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budget-tracker-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:akashjain042006@db:5432/BudgetTracker
      - DB_SSL=false
      - DB_PORT=5432
      - DB_NAME=BudgetTracker
      - JWT_SECRET=b8f9d4c6a1e2f3b7c5d6e8f9a0b1c2d3e4f56789abcdef012
      - SESSION_SECRET=9f7e6d5c4b3a2910ffeeddccbbaa99887766554433221100
      - GOOGLE_CLIENT_ID=990174094916-jfeh57o3e6gq29i8q2pm1g9h1262v8st.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - FRONTEND_URL=http://localhost:3000
      - BASE_URL=http://localhost:5000
      - CLOUDINARY_CLOUD_NAME=dclwhbvpo
      - CLOUDINARY_API_KEY=665454431129628
      - CLOUDINARY_API_SECRET=4iMQ1ryBoDWaM2J2vN1pbBtUseE
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BASE_URL=http://localhost:5000
    container_name: budget-tracker-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
